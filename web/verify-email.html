<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoTrack - Verify Email</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
  <style>
    .auth-container { min-height:100vh; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; padding:40px 0; }
    .auth-card { max-width:440px; width:100%; position:relative; z-index:10; }
    .otp-inputs { display:flex; gap:12px; justify-content:center; margin:24px 0; }
    .otp-input { width:52px; height:60px; text-align:center; font-size:1.5rem; font-weight:700; font-family:var(--font-display); background:var(--bg-surface); border:2px solid var(--border-color); border-radius:var(--radius-md); color:var(--text-primary); outline:none; transition:var(--transition-base); }
    .otp-input:focus { border-color:var(--primary); box-shadow:0 0 0 4px rgba(0,200,83,0.1); }
    .otp-input.filled { border-color:var(--primary); background:rgba(0,200,83,0.05); }
    .email-icon-wrap { width:80px; height:80px; border-radius:50%; background:rgba(0,200,83,0.1); border:2px solid rgba(0,200,83,0.25); display:flex; align-items:center; justify-content:center; font-size:2rem; color:var(--primary); margin:0 auto 20px; animation:pulse-glow 2s infinite; }
  </style>
</head>
<body data-theme="dark">
  <div class="auth-container">
    <div class="hero-bg"></div>
    <div class="hero-grid"></div>
    <div class="container-custom">
      <div class="d-flex justify-content-center">
        <div class="auth-card">
          <div class="mb-4"><a href="register.html" class="read-more"><i class="fas fa-arrow-left"></i> Back to Register</a></div>
          <div class="glass-card text-center">
            <div class="email-icon-wrap"><i class="fas fa-envelope-open-text"></i></div>
            <h2 class="fw-black mb-2">Verify Your Email</h2>
            <p class="text-muted-custom mb-1">Enter the 6-digit code sent to your terminal / email.</p>
            <p id="emailDisplay" class="text-primary-custom fw-bold" style="font-size:0.875rem;"></p>

            <form id="verifyForm">
              <!-- 6 OTP Boxes -->
              <div class="otp-inputs">
                <input type="text" class="otp-input" maxlength="1" id="otp0">
                <input type="text" class="otp-input" maxlength="1" id="otp1">
                <input type="text" class="otp-input" maxlength="1" id="otp2">
                <input type="text" class="otp-input" maxlength="1" id="otp3">
                <input type="text" class="otp-input" maxlength="1" id="otp4">
                <input type="text" class="otp-input" maxlength="1" id="otp5">
              </div>

              <button type="submit" class="btn-primary-custom w-100 justify-content-center mb-3">
                <span>Verify Account</span>
                <i class="fas fa-check-circle"></i>
              </button>
            </form>

            <p class="text-muted-custom" style="font-size:0.85rem;">
              Didn't get the code? <button id="resendBtn" class="inline-link border-0 bg-transparent p-0" style="color:var(--primary);">Resend Code</button>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="toast-container"></div>
  <script>
    const otpInputs = document.querySelectorAll('.otp-input');
    const pendingEmail = localStorage.getItem('pending_verify_email') || '';
    document.getElementById('emailDisplay').textContent = pendingEmail ? pendingEmail : 'your registered email';

    // Auto-focus and advance OTP boxes
    otpInputs.forEach((input, index) => {
      input.addEventListener('input', () => {
        input.value = input.value.replace(/\D/, '');
        if (input.value) { input.classList.add('filled'); if (index < 5) otpInputs[index + 1].focus(); }
        else input.classList.remove('filled');
      });
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !input.value && index > 0) otpInputs[index - 1].focus();
      });
    });

    document.getElementById('verifyForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const code = Array.from(otpInputs).map(i => i.value).join('');
      if (code.length < 6) { showLocalToast('Please fill all 6 digits.', 'error'); return; }
      const btn = e.target.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.innerHTML = `<span>Verifying...</span> <i class="fas fa-spinner fa-spin"></i>`;
      try {
        const res = await fetch('/api/verify-email', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email: pendingEmail, code}) });
        const result = await res.json();
        if (res.ok && result.success) {
          showLocalToast('Email verified! Redirecting to login...', 'success');
          localStorage.removeItem('pending_verify_email');
          setTimeout(() => window.location.href = 'login.html', 1500);
        } else { showLocalToast(result.message || 'Invalid code.', 'error'); btn.disabled = false; btn.innerHTML = `<span>Verify Account</span> <i class="fas fa-check-circle"></i>`; }
      } catch {
        showLocalToast('Mock verify success! Redirecting...', 'success');
        localStorage.removeItem('pending_verify_email');
        setTimeout(() => window.location.href = 'login.html', 1500);
      }
    });

    document.getElementById('resendBtn').addEventListener('click', () => showLocalToast('Resend not yet connected — check Flask console for code.', 'info'));

    function showLocalToast(message, type='success') {
      const c = document.querySelector('.toast-container'), t = document.createElement('div');
      t.className = `toast-item toast-${type}`;
      t.innerHTML = `<i class="fas ${type==='success'?'fa-check-circle':'fa-exclamation-circle'}" style="color:var(--primary);"></i><div class="toast-content">${message}</div>`;
      c.appendChild(t);
      setTimeout(() => { t.style.animation='toast-out 0.4s ease forwards'; t.addEventListener('animationend',()=>t.remove()); }, 4000);
    }
  </script>
</body>
</html>
