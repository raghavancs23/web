<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoTrack - Reset Password</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">

  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding: 40px 0;
    }
    .auth-card {
      max-width: 440px;
      width: 100%;
      position: relative;
      z-index: 10;
    }
    .step-section {
      display: none;
    }
    .step-section.active {
      display: block;
      animation: fadeIn 0.4s ease forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body data-theme="dark">

  <div class="auth-container">
    <div class="hero-bg"></div>
    <div class="hero-grid"></div>

    <div class="container-custom">
      <div class="d-flex justify-content-center">
        <div class="auth-card">
          
          <!-- Back Link -->
          <div class="mb-4">
            <a href="login.html" class="read-more"><i class="fas fa-arrow-left"></i> Back to Login</a>
          </div>

          <!-- Glassmorphic Card -->
          <div class="glass-card">
            <div class="text-center mb-4">
              <div class="brand-icon mx-auto mb-3">
                <i class="fas fa-key text-white"></i>
              </div>
              <h2 class="fw-black mb-1">Reset Password</h2>
              <p class="text-muted-custom">Recover your green analytics credentials.</p>
            </div>

            <!-- Step 1: Submit Email -->
            <div id="stepEmail" class="step-section active">
              <form id="emailForm">
                <div class="form-group mb-4">
                  <label for="email" class="form-label-custom">Email Address</label>
                  <input type="email" id="email" class="form-control-custom" placeholder="name@domain.com" required>
                </div>

                <button type="submit" class="btn-primary-custom w-100 justify-content-center">
                  <span>Send Recovery Code</span>
                  <i class="fas fa-paper-plane"></i>
                </button>
              </form>
            </div>

            <!-- Step 2: Code verification & New Password entry -->
            <div id="stepReset" class="step-section">
              <form id="resetForm">
                <div class="alert alert-info py-2 px-3 mb-3 border-0 rounded-custom" style="background: rgba(0, 200, 83, 0.08); font-size: 0.8rem; color: var(--primary);">
                  <i class="fas fa-info-circle me-1"></i> A 6-digit code has been printed to the server terminal.
                </div>

                <div class="form-group">
                  <label for="resetCode" class="form-label-custom">6-Digit Code</label>
                  <input type="text" id="resetCode" class="form-control-custom text-center fw-bold" maxlength="6" placeholder="0 0 0 0 0 0" required>
                </div>

                <div class="form-group">
                  <label for="newPassword" class="form-label-custom">New Password</label>
                  <input type="password" id="newPassword" class="form-control-custom" placeholder="At least 8 characters" required minlength="8">
                </div>

                <div class="form-group mb-4">
                  <label for="confirmNewPassword" class="form-label-custom">Confirm New Password</label>
                  <input type="password" id="confirmNewPassword" class="form-control-custom" placeholder="Verify password" required>
                </div>

                <button type="submit" class="btn-primary-custom w-100 justify-content-center">
                  <span>Update Password</span>
                  <i class="fas fa-check-circle"></i>
                </button>
              </form>
            </div>

          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Notifications Container -->
  <div class="toast-container"></div>

  <script>
    const emailForm = document.getElementById('emailForm');
    const resetForm = document.getElementById('resetForm');
    const stepEmail = document.getElementById('stepEmail');
    const stepReset = document.getElementById('stepReset');
    
    let userEmailAddress = '';

    // Action 1: Post Email
    emailForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      userEmailAddress = email;

      const submitBtn = emailForm.querySelector('button[type="submit"]');
      const origText = submitBtn.innerHTML;
      submitBtn.disabled = true;
      submitBtn.innerHTML = `<span>Sending...</span> <i class="fas fa-spinner fa-spin"></i>`;

      try {
        const response = await fetch('/api/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });

        const result = await response.json();

        if (response.ok && result.success) {
          showLocalToast('Reset code generated! Please check the Flask console output.', 'success');
          // Switch to Reset step
          setTimeout(() => {
            stepEmail.classList.remove('active');
            stepReset.classList.add('active');
          }, 1500);
        } else {
          showLocalToast(result.message || 'Error occurred.', 'error');
          submitBtn.disabled = false;
          submitBtn.innerHTML = origText;
        }
      } catch (err) {
        showLocalToast('Server is offline. Simulating recovery mode.', 'info');
        setTimeout(() => {
          stepEmail.classList.remove('active');
          stepReset.classList.add('active');
        }, 1500);
      }
    });

    // Action 2: Reset password
    resetForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const code = document.getElementById('resetCode').value;
      const new_password = document.getElementById('newPassword').value;
      const confirmNewPassword = document.getElementById('confirmNewPassword').value;

      if (new_password !== confirmNewPassword) {
        showLocalToast('Passwords do not match.', 'error');
        return;
      }

      const submitBtn = resetForm.querySelector('button[type="submit"]');
      const origText = submitBtn.innerHTML;
      submitBtn.disabled = true;
      submitBtn.innerHTML = `<span>Updating...</span> <i class="fas fa-spinner fa-spin"></i>`;

      try {
        const response = await fetch('/api/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: userEmailAddress, code, new_password })
        });

        const result = await response.json();

        if (response.ok && result.success) {
          showLocalToast('Password updated successfully! Redirecting to login...', 'success');
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 1500);
        } else {
          showLocalToast(result.message || 'Verification failed.', 'error');
          submitBtn.disabled = false;
          submitBtn.innerHTML = origText;
        }
      } catch (err) {
        showLocalToast('Mock password reset successful! Redirecting to login...', 'success');
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 1500);
      }
    });

    // Toast helper
    function showLocalToast(message, type = 'success') {
      const container = document.querySelector('.toast-container');
      const toast = document.createElement('div');
      toast.className = `toast-item toast-${type}`;
      let icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
      toast.innerHTML = `
        <i class="fas ${icon}" style="color: var(--primary);"></i>
        <div class="toast-content">${message}</div>
      `;
      container.appendChild(toast);
      setTimeout(() => {
        toast.style.animation = 'toast-out 0.4s ease forwards';
        toast.addEventListener('animationend', () => toast.remove());
      }, 4000);
    }
  </script>
</body>
</html>
