<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>EcoTrack - Feedback</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800;900&display=swap" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"><link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/animations.css"><link rel="stylesheet" href="css/app.css"></head>
<body data-theme="dark"><div class="app-layout"><div id="sidebarContainer"></div><div class="main-content" id="mainContent"><div id="topbarContainer"></div><div class="page-content"><div class="page-header"><h1 class="page-header-title">Share Feedback</h1><p class="page-header-subtitle">Help us make carbon tracking clearer, more useful, and more honest.</p></div><div class="section-card" style="max-width:760px"><div class="section-card-header"><div class="section-card-icon icon-gold"><i class="fas fa-star"></i></div><div class="section-card-title">Tell us about your experience</div></div><label class="app-form-label">Rating</label><div class="d-flex gap-2 mb-4" aria-label="Rating"><button class="topbar-icon-btn" onclick="setRating(1)"><i class="fas fa-star"></i></button><button class="topbar-icon-btn" onclick="setRating(2)"><i class="fas fa-star"></i></button><button class="topbar-icon-btn" onclick="setRating(3)"><i class="fas fa-star"></i></button><button class="topbar-icon-btn" onclick="setRating(4)"><i class="fas fa-star"></i></button><button class="topbar-icon-btn" onclick="setRating(5)"><i class="fas fa-star"></i></button></div><label class="app-form-label">Your feedback</label><textarea class="app-form-control" rows="5" placeholder="What should we improve?"></textarea><button class="btn-primary-custom mt-4" onclick="showAppToast('Thanks for helping EcoTrack improve.')"><span>Send feedback</span><i class="fas fa-paper-plane"></i></button></div></div></div></div><script src="js/app.js"></script><script>renderSidebar('feedback.html'); renderTopbar('Feedback', 'Feedback'); function setRating(rating) { document.querySelectorAll('[aria-label=Rating] .topbar-icon-btn').forEach((button, index) => button.style.color = index < rating ? 'var(--accent-warm)' : 'var(--text-secondary)'); }</script></body></html>
